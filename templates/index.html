        <line x1="18" y1="46" x2="18" y2="72" stroke="#3B6D11" stroke-width="3" stroke-linecap="round"/>

    <div class="header">
        <div class="title">🧸 Explain like I'm 3!</div>
        <div class="subtitle">Ask anything — I'll make it super simple ✨</div>
    </div>

    <div class="chat-window" id="chat">
        <div class="empty" id="empty">Ask me anything!<br>Try "What is gravity?" 🌍</div>
    </div>

    <div class="input-wrap">
        <div class="input-row">
            <input class="pill-input" id="userInput" placeholder="What do you want to know? ✨" onkeydown="if(event.key==='Enter') send()" />
            <button class="ask-btn" id="sendBtn" onclick="send()">Ask!</button>
        </div>
        <div class="dots">
            <div class="dot" id="d1"></div>
            <div class="dot" id="d2"></div>
            <div class="dot" id="d3"></div>
        </div>
    </div>

</div>

<script>
    let msgCount = 0;

    function updateDots() {
        document.getElementById('d1').className = 'dot' + (msgCount >= 1 ? ' on' : '');
        document.getElementById('d2').className = 'dot' + (msgCount >= 2 ? ' on' : '');
        document.getElementById('d3').className = 'dot' + (msgCount >= 3 ? ' on' : '');
    }

    async function send() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        const chat = document.getElementById('chat');
        const empty = document.getElementById('empty');
        if (empty) empty.remove();

        chat.innerHTML += `<div class="bw u"><div class="av u">😊</div><div class="bubble u">${text}</div></div>`;
        input.value = '';
        msgCount++;
        updateDots();

        document.getElementById('sendBtn').disabled = true;
        chat.innerHTML += `<div class="bw" id="loading"><div class="av ai">🌟</div><div class="bubble ai thinking">thinking...</div></div>`;
        chat.scrollTop = chat.scrollHeight;

        const res = await fetch('/explain', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text, count: msgCount })
        });

        const data = await res.json();
        document.getElementById('loading').remove();
        chat.innerHTML += `<div class="bw"><div class="av ai">🌟</div><div class="bubble ai">${data.reply}</div></div>`;

        document.getElementById('sendBtn').disabled = false;
        chat.scrollTop = chat.scrollHeight;
    }
</script>
</body>
