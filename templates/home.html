<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Learning Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #fffbf4; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Baloo 2', cursive; padding: 32px 20px; overflow: hidden; position: relative; }
        .doodle { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .header { text-align: center; margin-bottom: 40px; position: relative; z-index: 2; }
        .title { font-size: 38px; font-weight: 800; color: #3C3489; }
        .subtitle { font-size: 18px; color: #AFA9EC; margin-top: 6px; }
        .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; position: relative; z-index: 2; }
        .card { background: white; border-radius: 24px; border: 2.5px solid #EEEDFE; padding: 36px 32px; width: 260px; text-align: center; cursor: pointer; transition: transform 0.15s, border-color 0.15s; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .card:hover { transform: translateY(-6px); }
        .card.eli3:hover { border-color: #7F77DD; }
        .card.spanish:hover { border-color: #1D9E75; }
        .card-emoji { font-size: 56px; line-height: 1; }
        .card-title { font-size: 22px; font-weight: 800; }
        .card.eli3 .card-title { color: #3C3489; }
        .card.spanish .card-title { color: #0F6E56; }
        .card-desc { font-size: 15px; color: #888780; line-height: 1.5; }
        .card-btn { margin-top: 8px; padding: 10px 24px; border-radius: 50px; border: none; font-size: 16px; font-weight: 800; cursor: pointer; font-family: 'Baloo 2', cursive; }
        .card.eli3 .card-btn { background: #7F77DD; color: white; }
        .card.spanish .card-btn { background: #1D9E75; color: white; }
    </style>
</head>
<body>

<svg class="doodle" viewBox="0 0 680 600" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
  <g transform="translate(18,30)">
    <circle cx="18" cy="18" r="18" fill="#FAC775"/>
    <circle cx="18" cy="0" r="7" fill="#FAC775"/><circle cx="18" cy="36" r="7" fill="#FAC775"/>
    <circle cx="0" cy="18" r="7" fill="#FAC775"/><circle cx="36" cy="18" r="7" fill="#FAC775"/>
    <circle cx="5" cy="5" r="6" fill="#FAC775"/><circle cx="31" cy="5" r="6" fill="#FAC775"/>
    <circle cx="5" cy="31" r="6" fill="#FAC775"/><circle cx="31" cy="31" r="6" fill="#FAC775"/>
    <circle cx="18" cy="18" r="10" fill="#EF9F27"/>
    <line x1="18" y1="46" x2="18" y2="72" stroke="#3B6D11" stroke-width="3" stroke-linecap="round"/>
    <path d="M18 58 Q8 50 4 42" fill="none" stroke="#3B6D11" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(600,20)">
    <circle cx="18" cy="18" r="18" fill="#F4C0D1"/>
    <circle cx="18" cy="0" r="7" fill="#F4C0D1"/><circle cx="18" cy="36" r="7" fill="#F4C0D1"/>
    <circle cx="0" cy="18" r="7" fill="#F4C0D1"/><circle cx="36" cy="18" r="7" fill="#F4C0D1"/>
    <circle cx="5" cy="5" r="6" fill="#F4C0D1"/><circle cx="31" cy="5" r="6" fill="#F4C0D1"/>
    <circle cx="5" cy="31" r="6" fill="#F4C0D1"/><circle cx="31" cy="31" r="6" fill="#F4C0D1"/>
    <circle cx="18" cy="18" r="10" fill="#D4537E"/>
    <line x1="18" y1="46" x2="18" y2="72" stroke="#3B6D11" stroke-width="3" stroke-linecap="round"/>
    <path d="M18 58 Q28 50 32 42" fill="none" stroke="#3B6D11" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(80,50)" opacity="0.7">
    <ellipse cx="30" cy="20" rx="30" ry="18" fill="#CECBF6"/>
    <ellipse cx="55" cy="15" rx="22" ry="15" fill="#CECBF6"/>
    <ellipse cx="10" cy="18" rx="18" ry="13" fill="#CECBF6"/>
    <ellipse cx="30" cy="26" rx="35" ry="14" fill="#EEEDFE"/>
  </g>
  <g transform="translate(470,40)" opacity="0.7">
    <ellipse cx="30" cy="20" rx="28" ry="16" fill="#FAC775" opacity="0.5"/>
    <ellipse cx="52" cy="16" rx="20" ry="13" fill="#FAC775" opacity="0.5"/>
    <ellipse cx="10" cy="18" rx="17" ry="12" fill="#FAC775" opacity="0.5"/>
    <ellipse cx="30" cy="25" rx="32" ry="13" fill="#FAEEDA"/>
  </g>
  <g transform="translate(30,400)" opacity="0.4">

  </g>
  <g transform="translate(600,380)" opacity="0.4">
    <circle cx="8" cy="8" r="8" fill="none" stroke="#FAC775" stroke-width="2.5"/>
    <circle cx="30" cy="4" r="5" fill="none" stroke="#CECBF6" stroke-width="2"/>
    <circle cx="20" cy="22" r="6" fill="none" stroke="#9FE1CB" stroke-width="2"/>
  </g>
  <g transform="translate(280,520)" opacity="0.4">
    <path d="M0 10 Q5 0 10 10 Q15 20 20 10 Q25 0 30 10 Q35 20 40 10 Q45 0 50 10" fill="none" stroke="#CECBF6" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>

<div class="header">
    <div class="title">👋 Welcome!</div>
    <div class="subtitle">What do you want to do today?</div>
</div>

<div class="cards">
    <a href="/eli3" class="card eli3">
        <div class="card-emoji">🧸</div>
        <div class="card-title">Explain Like I'm 3</div>
        <div class="card-desc">Ask anything and get a super simple explanation from a world-class professor</div>
        <button class="card-btn">Let's learn!</button>
    </a>
    <a href="/spanish" class="card spanish">
        <div class="card-emoji">🇪🇸</div>
        <div class="card-title">Spanish Tutor</div>
        <div class="card-desc">Chat, speak, and learn Spanish from scratch with live corrections</div>
        <button class="card-btn">Hola!</button>
    </a>
</div>

</body>
</html>
